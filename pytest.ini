[pytest]
addopts = -ra -q --strict-markers --strict-config --import-mode=importlib
minversion = 7.0
testpaths = tests services/artana_evidence_db/tests services/artana_evidence_api/tests
pythonpath = . services
asyncio_mode = auto
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*
asyncio_default_fixture_loop_scope = function
markers =
    unit: Unit tests
    integration: Integration tests
    slow: Slow running tests
    api: API endpoint tests
    database: Database tests
    architecture: Architectural compliance tests
    graph: Graph and claim-ledger invariant tests
    live: Opt-in tests against running local services
    external: Opt-in tests against public external services
    performance: Performance tests
filterwarnings =
    ignore:You should use `Logger` instead\.:DeprecationWarning
    ignore:You should use `LoggerProvider` instead\.:DeprecationWarning
    ignore:You should use `ProxyLoggerProvider` instead\.:DeprecationWarning
