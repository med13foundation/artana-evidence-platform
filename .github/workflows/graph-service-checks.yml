name: Graph Service Checks

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: graph-service-checks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  plan_service_checks:
    runs-on: ubuntu-latest
    outputs:
      docs_only: ${{ steps.plan.outputs.docs_only }}
      evidence_api: ${{ steps.plan.outputs.evidence_api }}
      graph_service: ${{ steps.plan.outputs.graph_service }}
      repo_control: ${{ steps.plan.outputs.repo_control }}
      full: ${{ steps.plan.outputs.full }}
      targeted_tests: ${{ steps.plan.outputs.targeted_tests }}
      targeted_test_paths: ${{ steps.plan.outputs.targeted_test_paths }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Collect changed files
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch --no-tags --depth=1 origin "${{ github.base_ref }}:refs/remotes/origin/${{ github.base_ref }}"
            git diff --name-only "origin/${{ github.base_ref }}"...HEAD > /tmp/changed-files.txt
          else
            : > /tmp/changed-files.txt
          fi

      - name: Plan service checks
        id: plan
        run: |
          python3 scripts/ci/plan_service_checks.py \
            --changed-files /tmp/changed-files.txt \
            --event-name "${{ github.event_name }}" \
            --ref "${{ github.ref }}" \
            >> "$GITHUB_OUTPUT"

  graph_targeted_tests:
    needs: plan_service_checks
    if: needs.plan_service_checks.outputs.targeted_tests == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      PYTHONUNBUFFERED: "1"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        run: make install-dev

      - name: Run changed unit tests
        run: venv/bin/python3 -m pytest ${{ needs.plan_service_checks.outputs.targeted_test_paths }} -q

  graph_repo_control_checks:
    needs: plan_service_checks
    if: needs.plan_service_checks.outputs.repo_control == 'true' && needs.plan_service_checks.outputs.full != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      PYTHONUNBUFFERED: "1"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        run: make install-dev

      - name: Run repository control tests
        run: |
          venv/bin/python3 -m pytest \
            tests/unit/test_ci_service_check_planner.py \
            tests/unit/test_control_files.py \
            tests/unit/test_coverage_enforcement_contract.py \
            tests/unit/test_makefile_type_gate_contract.py \
            -q

  graph_service_gate:
    needs: plan_service_checks
    if: needs.plan_service_checks.outputs.full == 'true' || needs.plan_service_checks.outputs.graph_service == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: artana_dev
          POSTGRES_USER: artana_dev
          POSTGRES_PASSWORD: artana_dev_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U artana_dev -d artana_dev"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      PYTHONUNBUFFERED: "1"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        run: make install-dev

      - name: Write Postgres env file
        run: |
          printf '%s\n' \
            'ARTANA_POSTGRES_DB=artana_dev' \
            'ARTANA_POSTGRES_USER=artana_dev' \
            'ARTANA_POSTGRES_PASSWORD=artana_dev_password' \
            'ARTANA_POSTGRES_PORT=5432' \
            'ARTANA_POSTGRES_HOST=127.0.0.1' \
            'DATABASE_URL=postgresql+psycopg2://artana_dev:artana_dev_password@127.0.0.1:5432/artana_dev' \
            'ASYNC_DATABASE_URL=postgresql+asyncpg://artana_dev:artana_dev_password@127.0.0.1:5432/artana_dev' \
            'ALEMBIC_DATABASE_URL=postgresql+psycopg2://artana_dev:artana_dev_password@127.0.0.1:5432/artana_dev' \
            'FLUJO_STATE_URI=postgresql://artana_dev:artana_dev_password@127.0.0.1:5432/artana_dev?options=-c%20search_path=flujo,public' \
            'ARTANA_ENABLE_ENTITY_EMBEDDINGS=0' \
            'ARTANA_ENABLE_RELATION_SUGGESTIONS=0' \
            'NCBI_API_KEY=' \
            'NCBI_EMAIL=' \
            'NCBI_TOOL=artana-resource-library' \
            'ARTANA_ADMIN_PASSWORD=change_me_locally1' \
            > .env.postgres

      - name: Run graph service checks
        run: |
          if [ "${{ needs.plan_service_checks.outputs.full }}" = "true" ]; then
            make graph-service-static-checks
          else
            make graph-service-checks
          fi

  graph-service-checks:
    needs:
      - plan_service_checks
      - graph_targeted_tests
      - graph_repo_control_checks
      - graph_service_gate
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Summarize graph service checks
        run: |
          echo "docs_only=${{ needs.plan_service_checks.outputs.docs_only }}"
          echo "targeted_tests=${{ needs.plan_service_checks.outputs.targeted_tests }}"
          echo "repo_control=${{ needs.plan_service_checks.outputs.repo_control }}"
          echo "graph_service=${{ needs.plan_service_checks.outputs.graph_service }}"
          echo "full=${{ needs.plan_service_checks.outputs.full }}"
          case "${{ needs.graph_targeted_tests.result }}" in
            success|skipped) ;;
            *) exit 1 ;;
          esac
          case "${{ needs.graph_repo_control_checks.result }}" in
            success|skipped) ;;
            *) exit 1 ;;
          esac
          case "${{ needs.graph_service_gate.result }}" in
            success|skipped) ;;
            *) exit 1 ;;
          esac
