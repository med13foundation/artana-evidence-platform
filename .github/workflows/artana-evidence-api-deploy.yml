          image: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/cloud-run-source-deploy/artana-evidence-api-staging:${{ github.sha }}
          region: ${{ env.REGION }}
          project_id: ${{ env.PROJECT_ID }}
          flags: --no-allow-unauthenticated

      - name: Sync Artana Evidence API runtime config (Staging)
        env:
          PROJECT_ID: ${{ env.PROJECT_ID }}
          REGION: ${{ env.REGION }}
          ARTANA_ENV: staging
          ARTANA_EVIDENCE_API_SERVICE: artana-evidence-api-staging
          ARTANA_EVIDENCE_API_CLOUDSQL_CONNECTION_NAME: ${{ vars.GRAPH_HARNESS_CLOUDSQL_CONNECTION_NAME_STAGING }}
          ARTANA_EVIDENCE_API_DATABASE_URL_SECRET_NAME: ${{ vars.GRAPH_HARNESS_DATABASE_URL_SECRET_NAME_STAGING }}
          AUTH_JWT_SECRET_NAME: ${{ vars.ARTANA_JWT_SECRET_NAME_STAGING }}
          OPENAI_API_KEY_SECRET_NAME: ${{ vars.OPENAI_API_KEY_SECRET_NAME_STAGING }}
          ARTANA_EVIDENCE_API_BOOTSTRAP_KEY_SECRET_NAME: ${{ vars.ARTANA_EVIDENCE_API_BOOTSTRAP_KEY_SECRET_NAME_STAGING }}
          ARTANA_EVIDENCE_API_REMOVE_BOOTSTRAP_KEY: ${{ vars.ARTANA_EVIDENCE_API_REMOVE_BOOTSTRAP_KEY_STAGING }}
          GRAPH_API_URL: ${{ vars.GRAPH_PUBLIC_URL_STAGING }}
          ARTANA_EVIDENCE_API_MIN_INSTANCES: ${{ vars.GRAPH_HARNESS_MIN_INSTANCES_STAGING }}
          ARTANA_EVIDENCE_API_PUBLIC: ${{ vars.GRAPH_HARNESS_PUBLIC_STAGING }}
          ARTANA_EVIDENCE_API_SERVICE_NAME: Artana Evidence API (Staging)
          ARTANA_EVIDENCE_API_DB_POOL_SIZE: ${{ vars.GRAPH_HARNESS_DB_POOL_SIZE_STAGING }}
          ARTANA_EVIDENCE_API_DB_MAX_OVERFLOW: ${{ vars.GRAPH_HARNESS_DB_MAX_OVERFLOW_STAGING }}
          ARTANA_EVIDENCE_API_DB_POOL_TIMEOUT_SECONDS: ${{ vars.GRAPH_HARNESS_DB_POOL_TIMEOUT_SECONDS_STAGING }}
          ARTANA_EVIDENCE_API_DB_POOL_RECYCLE_SECONDS: ${{ vars.GRAPH_HARNESS_DB_POOL_RECYCLE_SECONDS_STAGING }}
          ARTANA_EVIDENCE_API_DB_POOL_USE_LIFO: ${{ vars.GRAPH_HARNESS_DB_POOL_USE_LIFO_STAGING }}
          ARTANA_EVIDENCE_API_MIGRATION_JOB_NAME: ${{ vars.GRAPH_HARNESS_MIGRATION_JOB_NAME_STAGING }}
          ARTANA_EVIDENCE_API_MIGRATION_JOB_IMAGE: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/cloud-run-source-deploy/artana-evidence-api-staging:${{ github.sha }}
          ARTANA_POOL_MIN_SIZE: ${{ vars.ARTANA_POOL_MIN_SIZE_STAGING }}
          ARTANA_POOL_MAX_SIZE: ${{ vars.ARTANA_POOL_MAX_SIZE_STAGING }}
          ARTANA_COMMAND_TIMEOUT_SECONDS: ${{ vars.ARTANA_COMMAND_TIMEOUT_SECONDS_STAGING }}
        run: bash scripts/deploy/sync_artana_evidence_api_cloud_run_runtime_config.sh

  deploy-production:
    name: Deploy Artana Evidence API to Production
    if: >
      (github.event_name == 'release' && github.event.action == 'published') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production')
