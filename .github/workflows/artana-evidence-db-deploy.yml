name: Artana Evidence DB Deploy

on:
  push:
    branches:
      - main
      - develop
    paths:
      - ".github/workflows/artana-evidence-db-deploy.yml"
      - ".dockerignore"
      - "Makefile"
      - "pyproject.toml"
      - "pytest.ini"
      - "scripts/**"
      - "services/artana_evidence_db/**"
      - "tests/**"
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      environment:
        description: Optional deployment target for manual runs
        required: false
        default: none
        type: choice
        options:
          - none
          - dev
          - staging
          - production

permissions:
  contents: read
  id-token: write
  packages: write

concurrency:
  group: artana-evidence-db-deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  REGION: us-central1
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
  GCP_DEPLOYER_SERVICE_ACCOUNT: ${{ vars.GCP_DEPLOYER_SERVICE_ACCOUNT }}

jobs:
  graph-service-checks:
    name: Graph Service Checks
    runs-on: ubuntu-latest
    timeout-minutes: 45
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: artana_dev
          POSTGRES_USER: artana_dev
          POSTGRES_PASSWORD: artana_dev_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U artana_dev -d artana_dev"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      PYTHONUNBUFFERED: "1"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        run: make install-dev

      - name: Write Postgres env file
        run: |
          printf '%s\n' \
            'ARTANA_POSTGRES_DB=artana_dev' \
            'ARTANA_POSTGRES_USER=artana_dev' \
            'ARTANA_POSTGRES_PASSWORD=artana_dev_password' \
            'ARTANA_POSTGRES_PORT=5432' \
            'ARTANA_POSTGRES_HOST=127.0.0.1' \
            'DATABASE_URL=postgresql+psycopg2://artana_dev:artana_dev_password@127.0.0.1:5432/artana_dev' \
            'ASYNC_DATABASE_URL=postgresql+asyncpg://artana_dev:artana_dev_password@127.0.0.1:5432/artana_dev' \
            'ALEMBIC_DATABASE_URL=postgresql+psycopg2://artana_dev:artana_dev_password@127.0.0.1:5432/artana_dev' \
            'FLUJO_STATE_URI=postgresql://artana_dev:artana_dev_password@127.0.0.1:5432/artana_dev?options=-c%20search_path=flujo,public' \
            'ARTANA_ENABLE_ENTITY_EMBEDDINGS=0' \
            'ARTANA_ENABLE_RELATION_SUGGESTIONS=0' \
            'NCBI_API_KEY=' \
            'NCBI_EMAIL=' \
            'NCBI_TOOL=artana-resource-library' \
            'ARTANA_ADMIN_PASSWORD=change_me_locally1' \
            > .env.postgres

      - name: Run graph service checks
        run: make graph-service-checks

  deploy-dev:
    name: Deploy Artana Evidence DB to Dev
    if: >
      (github.event_name == 'push' && github.ref == 'refs/heads/develop') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'dev')
    needs: graph-service-checks
    runs-on: ubuntu-latest
    environment:
      name: dev
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate Google Cloud deploy config
        run: |
          missing=()
          [ -n "${PROJECT_ID}" ] || missing+=("secrets.GCP_PROJECT_ID")
          [ -n "${GCP_WORKLOAD_IDENTITY_PROVIDER}" ] || missing+=("vars.GCP_WORKLOAD_IDENTITY_PROVIDER")
          [ -n "${GCP_DEPLOYER_SERVICE_ACCOUNT}" ] || missing+=("vars.GCP_DEPLOYER_SERVICE_ACCOUNT")
          if [ "${#missing[@]}" -gt 0 ]; then
            printf 'Missing required GitHub Actions deploy configuration:\n' >&2
            printf ' - %s\n' "${missing[@]}" >&2
            exit 1
          fi

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.GCP_DEPLOYER_SERVICE_ACCOUNT }}

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Ensure Artifact Registry repository exists
        run: bash scripts/deploy/ensure_artifact_registry_repository.sh

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker "${{ env.REGION }}-docker.pkg.dev" --quiet

      - name: Build and push Artana Evidence DB image (Dev)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./services/artana_evidence_db/Dockerfile
          push: true
          tags: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/cloud-run-source-deploy/artana-evidence-db-dev:${{ github.sha }}
          cache-from: type=gha,scope=artana-evidence-db
          cache-to: type=gha,mode=max,scope=artana-evidence-db

      - name: Deploy Artana Evidence DB to Cloud Run (Dev)
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: artana-evidence-db-dev
          image: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/cloud-run-source-deploy/artana-evidence-db-dev:${{ github.sha }}
          region: ${{ env.REGION }}
          project_id: ${{ env.PROJECT_ID }}
          flags: --no-allow-unauthenticated

      - name: Sync Artana Evidence DB runtime config (Dev)
        env:
          PROJECT_ID: ${{ env.PROJECT_ID }}
          REGION: ${{ env.REGION }}
          ARTANA_ENV: development
          GRAPH_SERVICE: artana-evidence-db-dev
          DATABASE_URL_SECRET_NAME: ${{ vars.DATABASE_URL_SECRET_NAME_DEV }}
          GRAPH_CLOUDSQL_CONNECTION_NAME: ${{ vars.GRAPH_CLOUDSQL_CONNECTION_NAME_DEV }}
          GRAPH_DATABASE_URL_SECRET_NAME: ${{ vars.GRAPH_DATABASE_URL_SECRET_NAME_DEV }}
          GRAPH_JWT_SECRET_NAME: ${{ vars.GRAPH_JWT_SECRET_NAME_DEV }}
          OPENAI_API_KEY_SECRET_NAME: ${{ vars.OPENAI_API_KEY_SECRET_NAME_DEV }}
          GRAPH_MIN_INSTANCES: ${{ vars.GRAPH_MIN_INSTANCES_DEV }}
          GRAPH_PUBLIC: ${{ vars.GRAPH_PUBLIC_DEV }}
          GRAPH_SERVICE_NAME: Artana Evidence DB (Dev)
          GRAPH_DB_POOL_SIZE: ${{ vars.GRAPH_DB_POOL_SIZE_DEV }}
          GRAPH_DB_MAX_OVERFLOW: ${{ vars.GRAPH_DB_MAX_OVERFLOW_DEV }}
          GRAPH_DB_POOL_TIMEOUT_SECONDS: ${{ vars.GRAPH_DB_POOL_TIMEOUT_SECONDS_DEV }}
          GRAPH_DB_POOL_RECYCLE_SECONDS: ${{ vars.GRAPH_DB_POOL_RECYCLE_SECONDS_DEV }}
          GRAPH_DB_POOL_USE_LIFO: ${{ vars.GRAPH_DB_POOL_USE_LIFO_DEV }}
          GRAPH_MIGRATION_JOB_NAME: ${{ vars.GRAPH_MIGRATION_JOB_NAME_DEV }}
          GRAPH_MIGRATION_JOB_IMAGE: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/cloud-run-source-deploy/artana-evidence-db-dev:${{ github.sha }}
          GRAPH_ENABLE_SEARCH_AGENT: ${{ vars.ARTANA_ENABLE_GRAPH_SEARCH_AGENT_DEV }}
          GRAPH_ENABLE_RELATION_SUGGESTIONS: ${{ vars.ARTANA_ENABLE_RELATION_SUGGESTIONS_DEV }}
          GRAPH_ENABLE_HYPOTHESIS_GENERATION: ${{ vars.ARTANA_ENABLE_HYPOTHESIS_GENERATION_DEV }}
          ARTANA_POOL_MIN_SIZE: ${{ vars.ARTANA_POOL_MIN_SIZE_DEV }}
          ARTANA_POOL_MAX_SIZE: ${{ vars.ARTANA_POOL_MAX_SIZE_DEV }}
          ARTANA_COMMAND_TIMEOUT_SECONDS: ${{ vars.ARTANA_COMMAND_TIMEOUT_SECONDS_DEV }}
        run: bash scripts/deploy/sync_graph_cloud_run_runtime_config.sh

  deploy-staging:
    name: Deploy Artana Evidence DB to Staging
    if: >
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'staging')
    needs: graph-service-checks
    runs-on: ubuntu-latest
    environment:
      name: staging
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate Google Cloud deploy config
        run: |
          missing=()
          [ -n "${PROJECT_ID}" ] || missing+=("secrets.GCP_PROJECT_ID")
          [ -n "${GCP_WORKLOAD_IDENTITY_PROVIDER}" ] || missing+=("vars.GCP_WORKLOAD_IDENTITY_PROVIDER")
          [ -n "${GCP_DEPLOYER_SERVICE_ACCOUNT}" ] || missing+=("vars.GCP_DEPLOYER_SERVICE_ACCOUNT")
          if [ "${#missing[@]}" -gt 0 ]; then
            printf 'Missing required GitHub Actions deploy configuration:\n' >&2
            printf ' - %s\n' "${missing[@]}" >&2
            exit 1
          fi

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.GCP_DEPLOYER_SERVICE_ACCOUNT }}

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Ensure Artifact Registry repository exists
        run: bash scripts/deploy/ensure_artifact_registry_repository.sh

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker "${{ env.REGION }}-docker.pkg.dev" --quiet

      - name: Build and push Artana Evidence DB image (Staging)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./services/artana_evidence_db/Dockerfile
          push: true
          tags: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/cloud-run-source-deploy/artana-evidence-db-staging:${{ github.sha }}
          cache-from: type=gha,scope=artana-evidence-db
          cache-to: type=gha,mode=max,scope=artana-evidence-db

      - name: Deploy Artana Evidence DB to Cloud Run (Staging)
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: artana-evidence-db-staging
          image: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/cloud-run-source-deploy/artana-evidence-db-staging:${{ github.sha }}
          region: ${{ env.REGION }}
          project_id: ${{ env.PROJECT_ID }}
          flags: --no-allow-unauthenticated

      - name: Sync Artana Evidence DB runtime config (Staging)
        env:
          PROJECT_ID: ${{ env.PROJECT_ID }}
          REGION: ${{ env.REGION }}
          ARTANA_ENV: staging
          GRAPH_SERVICE: artana-evidence-db-staging
          DATABASE_URL_SECRET_NAME: ${{ vars.DATABASE_URL_SECRET_NAME_STAGING }}
          GRAPH_CLOUDSQL_CONNECTION_NAME: ${{ vars.GRAPH_CLOUDSQL_CONNECTION_NAME_STAGING }}
          GRAPH_DATABASE_URL_SECRET_NAME: ${{ vars.GRAPH_DATABASE_URL_SECRET_NAME_STAGING }}
          GRAPH_JWT_SECRET_NAME: ${{ vars.GRAPH_JWT_SECRET_NAME_STAGING }}
          OPENAI_API_KEY_SECRET_NAME: ${{ vars.OPENAI_API_KEY_SECRET_NAME_STAGING }}
          GRAPH_MIN_INSTANCES: ${{ vars.GRAPH_MIN_INSTANCES_STAGING }}
          GRAPH_PUBLIC: ${{ vars.GRAPH_PUBLIC_STAGING }}
          GRAPH_SERVICE_NAME: Artana Evidence DB (Staging)
          GRAPH_DB_POOL_SIZE: ${{ vars.GRAPH_DB_POOL_SIZE_STAGING }}
          GRAPH_DB_MAX_OVERFLOW: ${{ vars.GRAPH_DB_MAX_OVERFLOW_STAGING }}
          GRAPH_DB_POOL_TIMEOUT_SECONDS: ${{ vars.GRAPH_DB_POOL_TIMEOUT_SECONDS_STAGING }}
          GRAPH_DB_POOL_RECYCLE_SECONDS: ${{ vars.GRAPH_DB_POOL_RECYCLE_SECONDS_STAGING }}
          GRAPH_DB_POOL_USE_LIFO: ${{ vars.GRAPH_DB_POOL_USE_LIFO_STAGING }}
          GRAPH_MIGRATION_JOB_NAME: ${{ vars.GRAPH_MIGRATION_JOB_NAME_STAGING }}
          GRAPH_MIGRATION_JOB_IMAGE: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/cloud-run-source-deploy/artana-evidence-db-staging:${{ github.sha }}
          GRAPH_ENABLE_SEARCH_AGENT: ${{ vars.ARTANA_ENABLE_GRAPH_SEARCH_AGENT_STAGING }}
          GRAPH_ENABLE_RELATION_SUGGESTIONS: ${{ vars.ARTANA_ENABLE_RELATION_SUGGESTIONS_STAGING }}
          GRAPH_ENABLE_HYPOTHESIS_GENERATION: ${{ vars.ARTANA_ENABLE_HYPOTHESIS_GENERATION_STAGING }}
          ARTANA_POOL_MIN_SIZE: ${{ vars.ARTANA_POOL_MIN_SIZE_STAGING }}
          ARTANA_POOL_MAX_SIZE: ${{ vars.ARTANA_POOL_MAX_SIZE_STAGING }}
          ARTANA_COMMAND_TIMEOUT_SECONDS: ${{ vars.ARTANA_COMMAND_TIMEOUT_SECONDS_STAGING }}
        run: bash scripts/deploy/sync_graph_cloud_run_runtime_config.sh

  deploy-production:
    name: Deploy Artana Evidence DB to Production
    if: >
      (github.event_name == 'release' && github.event.action == 'published') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production')
    needs: graph-service-checks
    runs-on: ubuntu-latest
    environment:
      name: production
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate Google Cloud deploy config
        run: |
          missing=()
          [ -n "${PROJECT_ID}" ] || missing+=("secrets.GCP_PROJECT_ID")
          [ -n "${GCP_WORKLOAD_IDENTITY_PROVIDER}" ] || missing+=("vars.GCP_WORKLOAD_IDENTITY_PROVIDER")
          [ -n "${GCP_DEPLOYER_SERVICE_ACCOUNT}" ] || missing+=("vars.GCP_DEPLOYER_SERVICE_ACCOUNT")
          if [ "${#missing[@]}" -gt 0 ]; then
            printf 'Missing required GitHub Actions deploy configuration:\n' >&2
            printf ' - %s\n' "${missing[@]}" >&2
            exit 1
          fi

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.GCP_DEPLOYER_SERVICE_ACCOUNT }}

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Ensure Artifact Registry repository exists
        run: bash scripts/deploy/ensure_artifact_registry_repository.sh

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker "${{ env.REGION }}-docker.pkg.dev" --quiet

      - name: Build and push Artana Evidence DB image (Production)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./services/artana_evidence_db/Dockerfile
          push: true
          tags: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/cloud-run-source-deploy/artana-evidence-db:${{ github.sha }}
          cache-from: type=gha,scope=artana-evidence-db
          cache-to: type=gha,mode=max,scope=artana-evidence-db

      - name: Deploy Artana Evidence DB to Cloud Run (Production)
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: artana-evidence-db
          image: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/cloud-run-source-deploy/artana-evidence-db:${{ github.sha }}
          region: ${{ env.REGION }}
          project_id: ${{ env.PROJECT_ID }}
          flags: --no-allow-unauthenticated

      - name: Sync Artana Evidence DB runtime config (Production)
        env:
          PROJECT_ID: ${{ env.PROJECT_ID }}
          REGION: ${{ env.REGION }}
          ARTANA_ENV: production
          GRAPH_SERVICE: artana-evidence-db
          DATABASE_URL_SECRET_NAME: ${{ vars.DATABASE_URL_SECRET_NAME_PROD }}
          GRAPH_CLOUDSQL_CONNECTION_NAME: ${{ vars.GRAPH_CLOUDSQL_CONNECTION_NAME_PROD }}
          GRAPH_DATABASE_URL_SECRET_NAME: ${{ vars.GRAPH_DATABASE_URL_SECRET_NAME_PROD }}
          GRAPH_JWT_SECRET_NAME: ${{ vars.GRAPH_JWT_SECRET_NAME_PROD }}
          OPENAI_API_KEY_SECRET_NAME: ${{ vars.OPENAI_API_KEY_SECRET_NAME_PROD }}
          GRAPH_MIN_INSTANCES: ${{ vars.GRAPH_MIN_INSTANCES_PROD }}
          GRAPH_PUBLIC: ${{ vars.GRAPH_PUBLIC_PROD }}
          GRAPH_SERVICE_NAME: Artana Evidence DB
          GRAPH_DB_POOL_SIZE: ${{ vars.GRAPH_DB_POOL_SIZE_PROD }}
          GRAPH_DB_MAX_OVERFLOW: ${{ vars.GRAPH_DB_MAX_OVERFLOW_PROD }}
          GRAPH_DB_POOL_TIMEOUT_SECONDS: ${{ vars.GRAPH_DB_POOL_TIMEOUT_SECONDS_PROD }}
          GRAPH_DB_POOL_RECYCLE_SECONDS: ${{ vars.GRAPH_DB_POOL_RECYCLE_SECONDS_PROD }}
          GRAPH_DB_POOL_USE_LIFO: ${{ vars.GRAPH_DB_POOL_USE_LIFO_PROD }}
          GRAPH_MIGRATION_JOB_NAME: ${{ vars.GRAPH_MIGRATION_JOB_NAME_PROD }}
          GRAPH_MIGRATION_JOB_IMAGE: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/cloud-run-source-deploy/artana-evidence-db:${{ github.sha }}
          GRAPH_ENABLE_SEARCH_AGENT: ${{ vars.ARTANA_ENABLE_GRAPH_SEARCH_AGENT_PROD }}
          GRAPH_ENABLE_RELATION_SUGGESTIONS: ${{ vars.ARTANA_ENABLE_RELATION_SUGGESTIONS_PROD }}
          GRAPH_ENABLE_HYPOTHESIS_GENERATION: ${{ vars.ARTANA_ENABLE_HYPOTHESIS_GENERATION_PROD }}
          ARTANA_POOL_MIN_SIZE: ${{ vars.ARTANA_POOL_MIN_SIZE_PROD }}
          ARTANA_POOL_MAX_SIZE: ${{ vars.ARTANA_POOL_MAX_SIZE_PROD }}
          ARTANA_COMMAND_TIMEOUT_SECONDS: ${{ vars.ARTANA_COMMAND_TIMEOUT_SECONDS_PROD }}
        run: bash scripts/deploy/sync_graph_cloud_run_runtime_config.sh
