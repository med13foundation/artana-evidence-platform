[build-system]
requires = ["setuptools>=69", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "artana-api"
version = "0.1.0"
description = "Public Python SDK for the Artana Evidence API"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "httpx>=0.27,<0.29",
    "pydantic>=2.8,<3",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
]

[tool.setuptools]
include-package-data = true

[tool.setuptools.package-dir]
"" = "src"

[tool.setuptools.packages.find]
where = ["src"]
include = ["artana_api*"]

[tool.setuptools.package-data]
artana_api = ["py.typed"]
